name: Build Binaries

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-binary:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: manylinux_x86_64
            docker_image: python:3.11-slim
            install_deps: "apt-get update -qq && apt-get install -y -qq build-essential binutils > /dev/null 2>&1"
            qemu: false
          - platform: musllinux_x86_64
            docker_image: python:3.11-alpine
            install_deps: "apk add --no-cache build-base binutils > /dev/null 2>&1"
            qemu: false
          - platform: manylinux_aarch64
            docker_image: python:3.11-slim
            install_deps: "apt-get update -qq && apt-get install -y -qq build-essential binutils > /dev/null 2>&1"
            qemu: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU for ARM64
        if: matrix.qemu
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build binary
        run: |
          PLATFORM_FLAG=""
          if [ "${{ matrix.qemu }}" = "true" ]; then
            PLATFORM_FLAG="--platform linux/arm64"
          fi

          docker run --rm $PLATFORM_FLAG \
            -v ${{ github.workspace }}:/app \
            -w /app \
            ${{ matrix.docker_image }} \
            sh -c "
              ${{ matrix.install_deps }}
              pip install -q -r requirements.txt pyinstaller
              pyinstaller --onefile --name main \
                --hidden-import python.db_requests \
                --hidden-import python.task \
                --hidden-import python.images \
                --hidden-import python.videos \
                --hidden-import python.imagehash \
                --hidden-import python.log \
                --hidden-import python.bundle_info \
                --hidden-import python.db_tables \
                --hidden-import python.ffmpeg_probe \
                --hidden-import python._version \
                main.py
            "

      - name: Package binary
        run: |
          BINARY_NAME="mediadc_${{ matrix.platform }}"
          mkdir -p "$BINARY_NAME"
          cp dist/main "$BINARY_NAME/main"
          tar czf "${BINARY_NAME}.tar.gz" "$BINARY_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mediadc_${{ matrix.platform }}
          path: mediadc_${{ matrix.platform }}.tar.gz

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: mediadc_${{ matrix.platform }}.tar.gz

      - name: Clean up root-owned files
        if: always()
        run: |
          docker run --rm -v ${{ github.workspace }}:/app python:3.11-slim \
            rm -rf /app/dist /app/build /app/main.spec

  package-app:
    runs-on: ubuntu-latest
    needs: build-binary
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend
        run: |
          npm ci
          npm run build

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries

      - name: Package app
        run: |
          # Create app directory with only the files needed for deployment
          mkdir -p mediadc/binaries

          # Copy app files (respecting .nextcloudignore)
          cp -r appinfo css img js l10n lib python templates main.py requirements.txt mediadc/
          cp COPYING LICENSE CHANGELOG.md mediadc/ 2>/dev/null || true

          # Extract and include binaries
          for tarball in binaries/*/mediadc_*.tar.gz; do
            tar xzf "$tarball" -C mediadc/binaries/
          done

          # Create the app tarball
          tar czf mediadc.tar.gz mediadc

      - name: Upload app package artifact
        uses: actions/upload-artifact@v4
        with:
          name: mediadc-app
          path: mediadc.tar.gz

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: mediadc.tar.gz
